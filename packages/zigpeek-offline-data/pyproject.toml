[project]
name = "zigpeek-offline-data"
version = "0.4.0"
description = "Prefetched Zig 0.16 stdlib + langref bundle for zigpeek's offline extra"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
# Pure data shim: no runtime deps. The build hook below uses the stdlib only.

[project.urls]
Homepage = "https://github.com/TanGentleman/zigpeek"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zigpeek_offline_data"]

# Custom build hook downloads sources.tar + langref.html for the pinned Zig
# version and stages them inside the package before the wheel is assembled.
# Hardcoded version stays in lockstep with zigpeek's DEFAULT_ZIG_VERSION;
# bump both at release time.
[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
