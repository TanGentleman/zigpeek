name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify pyproject versions match the tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          for f in pyproject.toml packages/zigpeek-offline/pyproject.toml; do
            v=$(grep -m1 -E '^version = ' "$f" | sed -E 's/.*"(.*)"/\1/')
            if [[ "$v" != "$tag" ]]; then
              echo "::error file=$f::version $v does not match tag $tag"
              exit 1
            fi
          done
          pin=$(grep -m1 -E 'zigpeek-offline==' pyproject.toml | sed -E 's/.*==([0-9][^"]*)".*/\1/')
          if [[ "$pin" != "$tag" ]]; then
            echo "::error file=pyproject.toml::offline pin $pin does not match tag $tag"
            exit 1
          fi

      - name: Build both wheels
        run: |
          uv build
          uv build --package zigpeek-offline

      - name: Verify wheels ship expected files
        run: |
          set -euo pipefail
          main=$(ls dist/zigpeek-*.whl | grep -v offline)
          off=$(ls dist/zigpeek_offline-*.whl)
          python -m zipfile -l "$main" | grep -q "_vendor/main.wasm"
          python -m zipfile -l "$off"  | grep -q "zigpeek_offline/.*/sources.tar"
          python -m zipfile -l "$off"  | grep -q "zigpeek_offline/.*/langref.html"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zigpeek
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: attach artifacts to GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*
